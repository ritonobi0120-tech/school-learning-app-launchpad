<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>学校用 学習アプリ入口</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell home-shell">
    <section class="hero panel">
      <p class="eyebrow">school launcher</p>
      <h1>学校用 学習アプリ入口</h1>
      <p class="hero-copy">学校の Chromebook で開きやすいように、アプリごとにそのまま開ける入口にしました。やりたいアプリを1つ押してください。</p>
      <div class="hero-note">うまく表示されないときは、ページの中の <b>「新しいタブで開く」</b> を押してください。</div>
    </section>

    <section class="grid">
      <a class="app-card" href="./nump.html">
        <span class="app-kicker">Number Puzzle</span>
        <strong>ナンプレ</strong>
        <span>マスをうめて、ナンプレを進める。</span>
      </a>
      <a class="app-card" href="./hyakumasu.html">
        <span class="app-kicker">100 Cell Math</span>
        <strong>百マス計算</strong>
        <span>1けたのたし算を、テンポよく練習する。</span>
      </a>
      <a class="app-card" href="./division.html">
        <span class="app-kicker">Division Library</span>
        <strong>割り算の筆算</strong>
        <span>10問ずつ進めて、図書館を直していく。</span>
      </a>
    </section>
  </main>
</body>
</html>
